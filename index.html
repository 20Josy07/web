<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un momento para nosotros ❤️</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --accent: #ff3366;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
        }

        @media (pointer: coarse) {
            * {
                cursor: auto !important;
            }

            #cursor-glow,
            #cursor-dot {
                display: none !important;
            }
        }

        body,
        html {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: #000;
            font-family: var(--font-sans);
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            z-index: 10;
        }

        /* --- 1. INTRO --- */
        #screen-intro {
            display: flex;
            z-index: 1000;
            background: #000;
            justify-content: center;
            align-items: center;
        }

        .btn-start {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 15px 40px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* --- 2. CINEMATICA --- */
        #screen-cinematic {
            background: #000;
        }

        #myVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Fundamental para celulares verticales, evita zoom/recorte */
            background: #000;
        }

        .cinema-bar {
            position: absolute;
            left: 0;
            width: 100%;
            height: 10vh;
            background: #000;
            z-index: 20;
        }

        .top-bar {
            top: 0;
        }

        .bottom-bar {
            bottom: 0;
        }

        /* --- 3. TELEFONO --- */
        #screen-phone {
            background: #000;
        }

        #phone-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('wallpaper.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        .phone-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 50px 20px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 40px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 10px;
            text-align: center;
        }

        .icon-box {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            /* Más redondeado tipo iOS */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 6px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            /* Sombra suave */
        }

        .app-name {
            color: #fff;
            font-size: 0.65rem;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        .ig {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .wa {
            background: #25D366;
        }

        .tk {
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .ph {
            background: #fff;
            color: #ff3366;
        }

        .sp {
            background: #1DB954;
        }

        .st {
            background: #8e8e93;
        }

        .dock {
            position: absolute;
            bottom: 25px;
            left: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
        }

        #notif-banner {
            position: absolute;
            top: -120px;
            left: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            z-index: 100;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        #notif-banner.show {
            transform: translateY(140px);
        }

        .notif-profile {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .notif-user {
            font-weight: 700;
            font-size: 0.9rem;
            color: #000;
        }

        .notif-msg {
            font-size: 0.85rem;
            color: #444;
        }

        /* --- 4. REGALO --- */
        #screen-gift {
            background: #fdfdfd;
            overflow-y: auto !important;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 51, 102, 0.1);
            border-radius: 40px;
            padding: 3rem;
            max-width: 900px;
            width: 92%;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 800px) {
            .glass-card {
                grid-template-columns: 1fr;
                padding: 2rem;
            }
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 3rem;
            margin-bottom: 1.5rem;
        }

        .letter {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #4a3a41;
            margin-bottom: 2rem;
        }

        .polaroid-frame {
            background: #fff;
            padding: 15px 15px 45px 15px;
            transform: rotate(2deg);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .polaroid-frame img {
            width: 100%;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            20% {
                opacity: 1;
                transform: translateY(0);
            }

            80% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        #cursor-glow {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 51, 102, 0.05) 0%, transparent 70%);
            position: fixed;
            pointer-events: none;
            z-index: 5000;
            transform: translate(-50%, -50%);
        }

        #cursor-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 5001;
            transform: translate(-50%, -50%);
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="cursor-glow"></div>
    <div id="cursor-dot"></div>

    <div id="screen-intro" class="screen" style="display: flex;">
        <button class="btn-start" onclick="iniciar()">Ver Introducción</button>
    </div>

    <div id="screen-cinematic" class="screen">
        <div class="top-bar cinema-bar"></div>
        <video id="myVideo" playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
        <div class="bottom-bar cinema-bar"></div>
    </div>

    <div id="screen-phone" class="screen" onclick="requestFS()">
        <div id="phone-bg"></div>
        <div id="notif-banner" onclick="abrirRegalo(event)">
            <img src="Profile.jpg" class="notif-profile">
            <div class="notif-content">
                <div class="notif-user">Mi amorcito 💖</div>
                <div id="notif-text-msg" class="notif-msg">Nuevo mensaje...</div>
            </div>
        </div>
        <div class="phone-content">
            <div class="status-bar">
                <div id="status-time">00:00</div>
                <div style="display:flex; gap:8px;"><i class="material-icons"
                        style="font-size:1rem;">signal_cellular_alt</i><i class="material-icons"
                        style="font-size:1rem;">wifi</i><i class="material-icons"
                        style="font-size:1rem;">battery_full</i></div>
            </div>
            <div class="app-grid">
                <div class="app-icon">
                    <div class="icon-box ig"><i class="material-icons">photo_camera</i></div><span
                        class="app-name">Instagram</span>
                </div>
                <div class="app-icon">
                    <div class="icon-box wa"><i class="material-icons">message</i></div><span
                        class="app-name">WhatsApp</span>
                </div>
                <div class="app-icon">
                    <div class="icon-box tk"><i class="material-icons">music_video</i></div><span
                        class="app-name">TikTok</span>
                </div>
                <div class="app-icon">
                    <div class="icon-box ph"><i class="material-icons">image</i></div><span
                        class="app-name">Fotos</span>
                </div>
                <div class="app-icon" onclick="playMusicAndContinue(event)">
                    <div class="icon-box sp" style="cursor: pointer;"><i class="material-icons">play_circle</i></div><span
                        class="app-name">Spotify</span>
                </div>
                <div class="app-icon">
                    <div class="icon-box st"><i class="material-icons">settings</i></div><span
                        class="app-name">Ajustes</span>
                </div>
            </div>
            <div class="dock">
                <div class="icon-box" style="background:#4cd964;"><i class="material-icons">phone</i></div>
                <div class="icon-box" style="background:#ff2d55;"><i class="material-icons">music_note</i></div>
                <div class="icon-box" style="background:#25D366;"><i class="material-icons">chat</i></div>
            </div>
        </div>
    </div>

    <div id="screen-gift" class="screen">
        <button id="btn-music" onclick="toggleMusic()" style="position: absolute; top: 25px; right: 25px; z-index: 1000; background: rgba(255,255,255,0.6); border: 1px solid rgba(255,51,102,0.2); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); cursor: pointer; color: var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <i class="material-icons" id="music-icon">pause</i>
        </button>
        <canvas id="loveCanvas"></canvas>
        <div class="glass-card">
            <div class="card-content">
                <div style="font-size:0.6rem; letter-spacing:5px; color:var(--accent); margin-bottom:1rem;">COLOMBIA —
                    MÉXICO</div>
                <h1>Mi Princesita</h1>
                <div id="letter-text" class="letter"></div>
                <div id="sig"
                    style="font-family:var(--font-serif); font-size:1.8rem; color:var(--accent); opacity:0; transition:2s;">
                    Feliz primer mes, Mi vida.</div>
                <div
                    style="display:flex; gap:2rem; margin-top:2rem; border-top:1px solid rgba(0,0,0,0.05); padding-top:2rem; flex-wrap: wrap;">
                    <div>
                        <div style="font-size:2rem; font-weight:600;">31</div>
                        <div style="font-size:0.6rem; color:var(--accent);">DÍAS</div>
                    </div>
                    <div>
                        <div style="font-size:2rem; font-weight:600;">∞</div>
                        <div style="font-size:0.6rem; color:var(--accent);">LLAMADAS</div>
                    </div>
                    <div>
                        <div style="font-size:2rem; font-weight:600;">1</div>
                        <div style="font-size:0.6rem; color:var(--accent);">DESTINO</div>
                    </div>
                </div>
            </div>
            <div class="polaroid-container" style="display: flex; justify-content: center; align-items: center;">
                <div class="polaroid-frame"><img src="Photo.jpg" style="max-width: 100%; height: auto;"></div>
            </div>
        </div>
    </div>

    <audio id="audio-notif">
        <source src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3">
    </audio>
    <audio id="audio-bg" loop>
        <source src="mi-persona-favorita-lyric-video.mp3">
    </audio>

    <script>
        function requestFS() {
            let el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }

        function iniciar() {
            requestFS();
            document.getElementById('screen-intro').style.display = 'none';
            document.getElementById('screen-cinematic').style.display = 'block';
            const video = document.getElementById('myVideo');
            video.play();

            video.onended = () => {
                mostrarTelefono();
            };
        }

        let notifStep = 0;
        function mostrarTelefono() {
            document.getElementById('screen-cinematic').style.display = 'none';
            document.getElementById('screen-phone').style.display = 'block';
            updateTime(); setInterval(updateTime, 1000);

            const banner = document.getElementById('notif-banner');
            const msgEl = document.getElementById('notif-text-msg');
            const sound = document.getElementById('audio-notif');

            // 1. Mensaje inicial
            setTimeout(() => {
                msgEl.innerText = "¿Estás ahí? ❤️";
                banner.classList.add('show');
                sound.currentTime = 0; sound.play();

                // 2. Instrucción de música
                setTimeout(() => {
                    msgEl.innerText = "Reproduce música porfa 🎵";
                    banner.style.transform = 'translateY(130px)';
                    setTimeout(() => { banner.style.transform = ''; }, 150);
                    sound.currentTime = 0; sound.play();
                    notifStep = 1; // Listo para que toque Spotify
                }, 3500);
            }, 3000);
        }

        function playMusicAndContinue(e) {
            e.stopPropagation();
            if (notifStep === 1) {
                // Reproducir la canción de fondo
                document.getElementById('audio-bg').play();
                notifStep = 2; // Música sonando, listo para el regalo
                
                const banner = document.getElementById('notif-banner');
                const msgEl = document.getElementById('notif-text-msg');
                const sound = document.getElementById('audio-notif');
                
                // Animación para indicar que se tocó Spotify
                e.currentTarget.style.transform = 'scale(0.9)';
                setTimeout(() => { e.currentTarget.style.transform = 'scale(1)'; }, 200);

                // 3. Enviar la notificación final sorpresa DESPUÉS de que suene la música
                setTimeout(() => {
                    msgEl.innerText = "¡Sorpresa! He preparado algo para ti... Toca para ver ✨";
                    banner.style.transform = 'translateY(130px)';
                    setTimeout(() => { banner.style.transform = ''; }, 150);
                    sound.currentTime = 0; sound.play();
                }, 2000);
            }
        }

        function abrirRegalo(e) {
            e.stopPropagation();
            if (notifStep !== 2) return; // Obligar a poner la música primero
            
            document.getElementById('screen-phone').style.display = 'none';
            document.getElementById('screen-gift').style.display = 'block';
            initCanvas();
            typeWriter();
        }

        function toggleMusic() {
            const audio = document.getElementById('audio-bg');
            const icon = document.getElementById('music-icon');
            if(audio.paused) {
                audio.play();
                icon.innerText = 'pause';
            } else {
                audio.pause();
                icon.innerText = 'play_arrow';
            }
        }

        function updateTime() {
            const n = new Date();
            document.getElementById('status-time').innerText = `${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}`;
        }

        const texto = `Hay personas que necesitan verse todos los días para sentir algo. Nosotros demostramos que se puede construir un universo entero solo con la voz y las palabras.\n\nEn estos 30 días, cada mensaje tuyo ha sido mi notificación favorita, y cada llamada, el mejor momento de mi día. No tenemos fotos juntos todavía, pero tenemos algo más fuerte: la certeza de que la distancia es temporal.`;
        function typeWriter() {
            let i = 0; const el = document.getElementById('letter-text');
            function p() {
                if (i < texto.length) {
                    el.innerHTML += texto.charAt(i) === '\n' ? '<br>' : texto.charAt(i);
                    i++; setTimeout(p, 35);
                } else { document.getElementById('sig').style.opacity = '1'; }
            }
            p();
        }

        const canvas = document.querySelector('canvas');
        const ctx = canvas.getContext('2d');
        let petals = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for (let i = 0; i < 50; i++) petals.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 5 + 2, sy: Math.random() * 1 + 1, r: Math.random() * 360 });
            loop();
        }
        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => {
                p.y += p.sy; p.r += 1;
                if (p.y > canvas.height) p.y = -10;
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r * Math.PI / 180);
                ctx.beginPath(); ctx.ellipse(0, 0, p.s, p.s * 1.5, 0, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255,51,102,0.3)"; ctx.fill(); ctx.restore();
            });
            requestAnimationFrame(loop);
        }

        const glow = document.getElementById('cursor-glow');
        const dot = document.getElementById('cursor-dot');
        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px';
            dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
        });
    </script>
</body>

</html>

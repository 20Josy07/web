<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone — Lock Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000;
        }

        /* --- Wallpaper --- */
        #phone-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('phone_wallpaper_1776381565137.png') no-repeat center center;
            background-size: cover;
            transition: transform 1s ease, filter 1s ease;
            z-index: 1;
        }

        .unlocked #phone-bg {
            transform: scale(1.1);
            filter: blur(20px) brightness(0.5);
        }

        /* --- Lock Screen Content --- */
        #lock-screen {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
            color: #fff;
            transition: opacity 0.8s ease;
        }

        #time {
            font-size: 5rem;
            font-weight: 200;
            margin-bottom: 5px;
            letter-spacing: -2px;
        }

        #date {
            font-size: 1.2rem;
            font-weight: 400;
            opacity: 0.9;
        }

        /* --- Notifications Container --- */
        #notifications-container {
            position: absolute;
            top: 250px;
            width: 100%;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20;
        }

        .notification {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 20px;
            padding: 15px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer;
        }

        .notification.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .notif-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .notif-app {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .notif-app i { font-size: 1rem; color: #25D366; }

        .notif-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .notif-body {
            font-size: 0.9rem;
            opacity: 0.8;
            line-height: 1.3;
        }

        /* --- Footer --- */
        #footer {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .slide-text {
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translateX(0); }
            50% { opacity: 0.7; transform: translateX(5px); }
        }

        .lock-icon {
            font-size: 1.5rem;
            opacity: 0.8;
        }

        /* --- Splash Overlay for sounds --- */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-unlock {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="btn-unlock" onclick="startPhone()">Presiona para continuar</button>
    </div>

    <div id="phone-bg"></div>

    <div id="lock-screen">
        <div class="lock-icon"><i class="material-icons">lock</i></div>
        <div id="time">00:00</div>
        <div id="date">Jueves, 16 de Abril</div>

        <div id="notifications-container">
            <!-- Notificaciones dinámicas -->
        </div>

        <div id="footer" onclick="unlock()">
            <div class="slide-text">Toca para abrir</div>
            <div style="width: 134px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.5;"></div>
        </div>
    </div>

    <audio id="notif-sound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startPhone() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay').style.display = 'none';
                updateTime();
                setInterval(updateTime, 1000);
                sequenceNotifications();
            }, 800);
        }

        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').innerText = `${hours}:${minutes}`;
            
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').innerText = now.toLocaleDateString('es-ES', options);
        }

        const notifications = [
            { app: 'WhatsApp', title: 'Él ❤️', body: '¿Estás ahí? Acabo de enviarte algo especial...' },
            { app: 'WhatsApp', title: 'Él ❤️', body: 'No puedo dejar de pensar en lo que ha pasado estos 30 días.' },
            { app: 'WhatsApp', title: 'Él ❤️', body: 'Toca aquí para verlo todo ✨' }
        ];

        function sequenceNotifications() {
            const container = document.getElementById('notifications-container');
            const sound = document.getElementById('notif-sound');

            notifications.forEach((notif, i) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'notification';
                    div.onclick = unlock;
                    div.innerHTML = `
                        <div class="notif-header">
                            <div class="notif-app"><i class="material-icons">message</i><span>${notif.app}</span></div>
                            <span>ahora</span>
                        </div>
                        <div class="notif-title">${notif.title}</div>
                        <div class="notif-body">${notif.body}</div>
                    `;
                    container.appendChild(div);
                    setTimeout(() => { 
                        div.classList.add('visible');
                        sound.currentTime = 0;
                        sound.play();
                    }, 50);
                }, (i + 1) * 2000);
            });
        }

        function unlock() {
            document.body.classList.add('unlocked');
            document.getElementById('lock-screen').style.opacity = '0';
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);
        }
    </script>
</body>
</html>

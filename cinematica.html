<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia — Cinematic</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff3366;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Outfit', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: var(--font-sans);
        }

        /* --- Contenedor de Video --- */
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            filter: brightness(0.8) contrast(1.1);
        }

        /* --- Capas de Cine --- */
        .cinema-bar {
            position: fixed;
            left: 0;
            width: 100%;
            height: 12vh;
            background: #000;
            z-index: 10;
        }
        .top-bar { top: 0; }
        .bottom-bar { bottom: 0; }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.7);
            z-index: 5;
            pointer-events: none;
        }

        /* --- Subtítulos y Texto --- */
        #subtitles {
            position: fixed;
            bottom: 15vh;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 20;
            width: 80%;
            transition: opacity 1s ease;
        }

        .subtitle-text {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            color: #fff;
            font-style: italic;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            opacity: 0;
            animation: fadeInOut 5s forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        /* --- Controles --- */
        #overlay-start {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .btn-play {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 15px 40px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.4s;
        }

        .btn-play:hover {
            background: #fff;
            color: #000;
        }

        .skip-btn {
            position: fixed;
            top: 40px;
            right: 40px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 30;
            transition: color 0.3s;
        }

        .skip-btn:hover { color: #fff; }

    </style>
</head>
<body>

    <div id="overlay-start">
        <button class="btn-play" onclick="startCinema()">Ver Cinemática</button>
    </div>

    <a href="telefono.html" class="skip-btn">Saltar</a>

    <div class="top-bar cinema-bar"></div>
    <div class="vignette"></div>

    <div id="video-container">
        <video id="myVideo" playsinline>
            <source src="video.mp4" type="video/mp4">
            Tu navegador no soporta video.
        </video>
    </div>

    <div id="subtitles">
        <!-- Los subtítulos se cargarán aquí dinámicamente -->
    </div>

    <div class="bottom-bar cinema-bar"></div>

    <script>
        const subtitlesData = [
            { text: "A veces el destino nos sorprende...", time: 2000 },
            { text: "Cruzando fronteras y distancias...", time: 7000 },
            { text: "Solo para encontrarte.", time: 12000 },
            { text: "Esta es nuestra historia.", time: 17000 }
        ];

        function startCinema() {
            const overlay = document.getElementById('overlay-start');
            const video = document.getElementById('myVideo');
            
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                video.play();
                showSubtitles();
            }, 1000);
        }

        function showSubtitles() {
            const container = document.getElementById('subtitles');
            subtitlesData.forEach(sub => {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'subtitle-text';
                    el.innerText = sub.text;
                    container.innerHTML = '';
                    container.appendChild(el);
                }, sub.time);
            });
        }

        // Redirigir al final del video
        document.getElementById('myVideo').onended = function() {
            window.location.href = "telefono.html";
        };
    </script>
</body>
</html>
